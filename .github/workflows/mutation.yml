name: Mutation Testing

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/backend/src/auth/**'
      - 'apps/backend/src/payments/**'
      - 'apps/backend/src/certificates/**'
      - 'apps/backend/src/waitlist/**'
      - 'apps/backend/src/**/*.spec.ts'
      - 'apps/backend/src/**/*.test.ts'
      - 'apps/backend/jest.config.js'
      - 'stryker.conf.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mutation.yml'

jobs:
  mutation-testing:
    name: Run Stryker mutation tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: scoopdope_test
        options: >-
          --health-cmd "pg_isready -U test_user -d scoopdope_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_NAME: scoopdope_test
      JWT_SECRET: test_secret_key_minimum_16_chars
      REDIS_URL: redis://localhost:6379
      STELLAR_NETWORK: testnet
      STELLAR_SECRET_KEY: SBZVMB74Z7TTIWZNZ7CLBT6OJRZKMV4ZSM7CEGJR5ZJQSTQG5O6HBSY
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      STELLAR_WEB_AUTH_DOMAIN: localhost
      EMAIL_HOST: localhost
      EMAIL_PORT: 587
      EMAIL_USER: test@example.com
      EMAIL_PASS: test_password
      EMAIL_ENABLED: 'false'
      FRONTEND_URL: http://localhost:3001
      CORS_ORIGINS: http://localhost:3001
      CI: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run test:mutation

      - name: Upload HTML mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-testing-report
          path: coverage/mutation/
          if-no-files-found: warn
          retention-days: 30
